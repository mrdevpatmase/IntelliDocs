<!DOCTYPE html>
<html>

<head>
    <title>Login - IntelliDocs</title>
    <link rel="stylesheet" href="auth.css">
</head>

<body>

    <div class="auth-container">

        <h1>IntelliDocs</h1>

        <h2>Login</h2>

        <input
            type="text"
            id="username"
            placeholder="Username"
        >

        <input
            type="password"
            id="password"
            placeholder="Password"
        >

        <button id="loginBtn">
            Login
        </button>

        <p>
            Don't have an account?
            <a href="register.html">
                Register
            </a>
        </p>

    </div>

    <script src="login.js"></script>

</body>
</html>

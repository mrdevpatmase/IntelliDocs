<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IntelliDocs</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

    <aside class="sidebar">

        <div class="brand">
            <h2>📄 IntelliDocs</h2>
            <p>
                Research. Summarize.
                <br>
                Discover.
            </p>
        </div>

        <button
            class="upload-btn"
            onclick="document.getElementById('pdfFile').click()"
        >
            + Upload PDF
        </button>

        <input
            type="file"
            id="pdfFile"
            accept=".pdf"
            hidden
        >

        <div class="documents-section">

            <h3>Your Documents</h3>

            <div id="documentsList">

            </div>

        </div>

    </aside>

    <main class="main">

        <div
            id="chatContainer"
            class="chat-container"
        >

            <div class="hero">

                <h1>IntelliDocs</h1>

                <p>
                    Chat with your PDFs using AI.
                </p>

            </div>

        </div>

        <div class="input-wrapper">

            <div class="input-box">

                <textarea
                    id="questionInput"
                    placeholder="Ask anything about your documents..."
                ></textarea>

                <button id="sendBtn">
                    ➜
                </button>

            </div>

        </div>

    </main>

</div>

<script src="script.js"></script>

</body>
</html>
